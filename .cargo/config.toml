[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# macOS uses default linker (Apple's linker is fast enough)

[alias]
t = "nextest run"
c = "clippy --workspace --all-targets"

[net]
retry = 3
