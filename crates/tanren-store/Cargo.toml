[package]
name = "tanren-store"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "Database access layer. The only place SQL and row-shape entities live in the workspace."

[lints]
workspace = true

[features]
default = []
# Test-only fixture seeding methods (e.g. `Store::seed_invitation`).
# Enabled only by `tanren-testkit` so production binaries cannot
# accidentally seed test data. The `xtask check-test-hooks` guard
# enforces that test-flavored pub fns live behind this gate.
test-hooks = []

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
sea-orm = { workspace = true }
sea-orm-migration = { workspace = true }
secrecy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tanren-configuration-secrets = { path = "../tanren-configuration-secrets" }
tanren-identity-policy = { path = "../tanren-identity-policy" }
thiserror = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
tokio = { workspace = true }
