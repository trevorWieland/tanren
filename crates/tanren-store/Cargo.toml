[package]
name = "tanren-store"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "Database access layer. The only place SQL and row-shape entities live in the workspace."

# SeaORM `DeriveEntityModel` generates `pub` items (`Model`, `Relation`,
# `Entity`, `Column`, …) that must remain `pub` for the macro expansion.
# The `entity/` module is crate-private by architectural rule (row shapes
# must not leak across the workspace dependency boundary), so every `pub`
# item inside it is technically unreachable — a false positive.  Override
# locally rather than relaxing the workspace-wide `unreachable_pub = "warn"`.
[lints.rust]
warnings = "deny"
unsafe_code = "forbid"
missing_debug_implementations = "warn"
unreachable_pub = "allow"
unused_qualifications = "warn"

[lints.clippy]
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
perf = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
panic = "deny"
todo = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
unimplemented = "deny"
allow_attributes = "deny"
allow_attributes_without_reason = "deny"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
needless_for_each = "allow"
disallowed_types = "allow"
disallowed_methods = "allow"

[features]
default = []
# Test-only fixture seeding methods (e.g. `Store::seed_invitation`).
# Enabled only by `tanren-testkit` so production binaries cannot
# accidentally seed test data. The `xtask check-test-hooks` guard
# enforces that test-flavored pub fns live behind this gate.
test-hooks = []

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
sea-orm = { workspace = true }
sea-orm-migration = { workspace = true }
secrecy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tanren-identity-policy = { path = "../tanren-identity-policy" }
thiserror = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
tokio = { workspace = true }
