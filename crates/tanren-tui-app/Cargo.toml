 tanren-app-services = { path = "../tanren-app-services" }
 tanren-contract = { path = "../tanren-contract" }
 tanren-domain = { path = "../tanren-domain" }
 tanren-identity-policy = { path = "../tanren-identity-policy" }
 tokio = { workspace = true }
