[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# Security advisories — deny known vulnerabilities
[advisories]
ignore = []

# License policy — permissive licenses only
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "OpenSSL",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true
registries = []

# Dependency bans
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# Source restrictions — crates.io only
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
