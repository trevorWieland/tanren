services:
  api:
    build:
      context: .
      dockerfile: services/tanren-api/Dockerfile
    ports:
      - "8199:8000"
    env_file:
      - api.test.env
    volumes:
      - test-data:/data
      - ~/github:/repos:ro
      - ./roles.yml:/config/roles.yml:ro
      - ./remote.yml:/config/remote.yml:ro
    restart: "no"

  daemon:
    build:
      context: .
      dockerfile: services/tanren-daemon/Dockerfile
    env_file:
      - daemon.env
    volumes:
      - test-data:/data
      - ~/github:/repos
      - ./roles.yml:/config/roles.yml:ro
      - ./remote.yml:/config/remote.yml:ro
      - ~/.ssh/hetzner_tanren:/config/ssh/hetzner_tanren:ro
      - ~/.config/tanren/secrets.env:/config/secrets.env:ro
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

volumes:
  test-data:
