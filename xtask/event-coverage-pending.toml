# Event-coverage pending allowlist.
#
# `xtask check-event-coverage` rejects every event variant in
# `AccountEventKind` that has no BDD step asserting it fires. Event
# variants that ship ahead of the BDD feature file that exercises them
# are listed here with a forward pointer to the spec that will close
# the gap.
#
# When the spec lands and the BDD step is written, remove the entry —
# the checker fails on stale entries (allowlisted variants that turn
# out to have BDD coverage after all, or names that no longer match a
# variant in the workspace).

