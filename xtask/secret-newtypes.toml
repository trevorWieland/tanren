# Workspace newtype types that legitimately wrap secrets.
# Listed here as either a fully-qualified path
# (e.g., `tanren_identity_policy::SessionToken`) or a leaf type name
# (e.g., `SessionToken`) — `xtask check-secrets` matches against the
# textual rendering of the field type, normalized for whitespace.
#
# Populated by PR 3 (`r-0001/sub-3-domain-types`) once the
# `SessionToken` newtype and `secrecy::SecretString` adoption land.
allowed = [
  "tanren_identity_policy::SessionToken",
  "SessionToken",
  "secrecy::SecretString",
  "secrecy::SecretBox",
]

# Per-(file, field) exemptions for legacy storage shapes that ship raw
# bytes/strings before a wrapper newtype lands. PR 5 swaps the
# `password_hash`/`password_salt` byte-vec pair for an Argon2id PHC
# string and these entries should be removed in that PR.
[[field_exemptions]]
file = "crates/tanren-store/src/entity/accounts.rs"
field = "password_hash"
ty = "Vec < u8 >"
reason = "PR 5 swaps to Argon2id PHC string; legacy SHA-256 byte hash kept until then."

[[field_exemptions]]
file = "crates/tanren-store/src/entity/accounts.rs"
field = "password_salt"
ty = "Vec < u8 >"
reason = "PR 5 deletes the explicit salt column in favour of Argon2's PHC-embedded salt."

[[field_exemptions]]
file = "crates/tanren-store/src/records.rs"
field = "password_hash"
ty = "Vec < u8 >"
reason = "Mirrors entity::accounts::Model.password_hash; same PR 5 swap."

[[field_exemptions]]
file = "crates/tanren-store/src/records.rs"
field = "password_salt"
ty = "Vec < u8 >"
reason = "Mirrors entity::accounts::Model.password_salt; same PR 5 swap."
