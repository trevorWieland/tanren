[project]
name = "tanren-core"
version = "0.1.0"
description = "Core business logic for tanren"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2, <3",
    "python-dotenv>=1.0, <2",
    "PyYAML>=6.0, <7",
    "aiosqlite>=0.20, <1",
    "paramiko>=3.0, <4",
]

[project.optional-dependencies]
hetzner = ["hcloud>=2.4.0, <3"]

[build-system]
requires = ["uv-build>=0.1.0"]
build-backend = "uv_build"

[tool.uv.build]
packages = ["src/tanren_core"]
