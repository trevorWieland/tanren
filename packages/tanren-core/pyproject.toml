[project]
name = "tanren-core"
version = "0.2.10"
description = "Core business logic for tanren"
requires-python = ">=3.14"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2, <3",
    "python-dotenv>=1.0, <2",
    "PyYAML>=6.0, <7",
    "aiosqlite>=0.20, <1",
    "paramiko>=3.0, <4",
    "asyncpg>=0.30, <1",
]

[project.optional-dependencies]
gcp = ["google-cloud-compute>=1.20.0, <2", "google-cloud-secret-manager>=2.20.0, <3"]
github = ["httpx>=0.27, <1"]
hetzner = ["hcloud>=2.4.0, <3"]
linear = ["httpx>=0.27, <1"]
docker = ["aiodocker>=0.23, <1"]
all = [
    "google-cloud-compute>=1.20.0, <2",
    "google-cloud-secret-manager>=2.20.0, <3",
    "httpx>=0.27, <1",
    "hcloud>=2.4.0, <3",
    "aiodocker>=0.23, <1",
]

[build-system]
requires = ["uv-build>=0.1.0"]
build-backend = "uv_build"

[tool.uv.build]
packages = ["src/tanren_core"]
