packages:
  - "apps/*"

# Catalog: centralized version pinning per
# profiles/react-ts-pnpm/global/dependency-management.md. Every package.json
# in the workspace references `catalog:default` rather than pinning versions
# individually, so dependency upgrades land in one place.
catalog:
  react: "19.2.5"
  react-dom: "19.2.5"
  "@types/react": "19.2.14"
  "@types/react-dom": "19.2.3"
  "@types/node": "25.6.0"
  typescript: "6.0.3"
  "@typescript/native-preview": "7.0.0-dev.20251030.1"
  oxlint: "1.62.0"
  vitest: "4.1.5"
  prettier: "3.4.2"
  "@inlang/paraglide-js": "2.18.0"
  valibot: "1.3.1"
  tailwindcss: "4.2.4"
  "@tailwindcss/postcss": "4.2.4"
  concurrently: "9.2.1"
  # Data fetching and remote state management.
  "@tanstack/react-query": "5.81.5"
  # Client-side routing (react-router v7 merged react-router-dom).
  "react-router": "7.6.3"
  # Component testing + visual contract (Storybook 9 + Vitest addon + a11y).
  storybook: "9.1.20"
  "@storybook/react-vite": "9.1.20"
  "@storybook/addon-vitest": "9.1.20"
  "@storybook/addon-a11y": "9.1.20"
  # Browser test runner used by @storybook/addon-vitest under the hood.
  "@vitest/browser": "4.1.5"
  "@vitest/browser-playwright": "4.1.5"
  # End-to-end + BDD-driven web slice harness.
  "@playwright/test": "1.59.1"
  "playwright-bdd": "8.5.0"
  "@axe-core/playwright": "4.11.3"
  # Radix UI primitives for accessible select components.
  "@radix-ui/react-select": "2.2.5"
  # Vite is pinned to ^7 because Storybook 9.1's framework packages
  # declare a `^5 || ^6 || ^7` peer range and vitest 4.1's transitive
  # `vite` bump to 8 trips that constraint. Drop this once Storybook 9
  # widens its vite peer.
  vite: "7.3.2"
  "@vitejs/plugin-react": "4.6.0"
