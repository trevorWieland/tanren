[project]
name = "tanren-daemon"
version = "0.2.8"
description = "Queue-consuming worker daemon for tanren"
requires-python = ">=3.14"
license = "Apache-2.0"
dependencies = [
    "tanren-core",
]

[project.optional-dependencies]
hetzner = ["tanren-core[hetzner]"]
gcp = ["tanren-core[gcp]"]
all = ["tanren-core[all]"]

[project.scripts]
tanren-daemon = "tanren_daemon.main:main"

[build-system]
requires = ["uv-build>=0.1.0"]
build-backend = "uv_build"

[tool.uv.build]
packages = ["src/tanren_daemon"]
