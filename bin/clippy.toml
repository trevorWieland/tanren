disallowed-types = [
  { path = "tanren_domain::DispatchId", reason = "Transport binaries must use tanren-contract/app-services boundaries, not domain IDs directly." },
  { path = "tanren_domain::ActorContext", reason = "Transport binaries must not construct trusted actor context directly." },
  { path = "tanren_policy::PolicyEngine", reason = "Transport binaries must compose through tanren-app-services." },
  { path = "tanren_orchestrator::Orchestrator", reason = "Transport binaries must not call orchestrator directly." },
  { path = "tanren_store::Store", reason = "Transport binaries must not call tanren-store directly." },
]

disallowed-methods = [
  { path = "tanren_store::StateStore::create_dispatch_projection", reason = "Route store writes through tanren-orchestrator use-cases." },
  { path = "tanren_store::StateStore::create_dispatch_with_initial_step", reason = "Route store writes through tanren-orchestrator use-cases." },
  { path = "tanren_store::StateStore::update_dispatch_status", reason = "Route store writes through tanren-orchestrator use-cases." },
  { path = "tanren_store::StateStore::cancel_dispatch", reason = "Route cancellation through tanren-orchestrator use-cases." },
  { path = "tanren_store::JobQueue::enqueue_step", reason = "Route queue writes through tanren-orchestrator use-cases." },
  { path = "tanren_store::JobQueue::ack", reason = "Route queue writes through tanren-orchestrator use-cases." },
  { path = "tanren_store::JobQueue::ack_and_enqueue", reason = "Route queue writes through tanren-orchestrator use-cases." },
  { path = "tanren_store::JobQueue::nack", reason = "Route queue writes through tanren-orchestrator use-cases." },
  { path = "tanren_store::JobQueue::cancel_pending_steps", reason = "Route queue writes through tanren-orchestrator use-cases." },
]
