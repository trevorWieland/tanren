[package]
name = "tanren-mcp"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Tanren MCP server — Model Context Protocol tool surface for AI agent integration"

[lints.rust]
warnings = "deny"
unsafe_code = "forbid"
missing_debug_implementations = "warn"
unreachable_pub = "warn"
unused_qualifications = "warn"

[lints.clippy]
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
perf = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
panic = "deny"
todo = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
unimplemented = "deny"
allow_attributes = "deny"
allow_attributes_without_reason = "deny"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
# rmcp's CallToolResult / ListToolsResult are `#[non_exhaustive]`,
# which blocks struct update syntax from this out-of-crate call site.
# Field-by-field mutation after `::default()` is the only workable
# shape; relax the clippy objection.
field_reassign_with_default = "allow"
# rmcp's `ServerHandler` methods return `impl Future<Output = ...>` with
# a lifetime, not an async fn — match the trait signature exactly.
manual_async_fn = "allow"

[dependencies]
tanren-app-services = { path = "../../crates/tanren-app-services" }
tanren-contract = { path = "../../crates/tanren-contract" }
anyhow.workspace = true
rmcp.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true
jsonwebtoken.workspace = true
chrono.workspace = true
