description = "Tanren control-plane daemon. F-0001 ships an empty event loop that boots, logs liveness, and shuts down gracefully on SIGTERM/SIGINT. Concrete control-plane workers (projection, outbox, scheduler, reconciliation) arrive with R-* slices."

