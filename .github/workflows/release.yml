name: Release

on:
  push:
    branches: [master]
    paths:
      - "services/tanren-api/**"
      - "packages/tanren-core/**"
      - "services/tanren-cli/pyproject.toml"
      - "services/tanren-daemon/pyproject.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/release.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/tanren-api/**"
      - "packages/tanren-core/**"
      - "services/tanren-cli/pyproject.toml"
      - "services/tanren-daemon/pyproject.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/release.yml"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  version:
    name: Bump Version
    if: github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}
      sha_short: ${{ steps.push.outputs.sha_short }}

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Bump version
        id: bump
        run: |
          version=$(python3 scripts/bump_version.py --part patch)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Update lockfile
        run: uv lock

      - name: Commit and push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml packages/tanren-core/pyproject.toml services/*/pyproject.toml uv.lock
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git pull --rebase https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git master
          git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git HEAD:master
          SHA="$(git rev-parse HEAD)"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & Push
    needs: version
    if: needs.version.outputs.version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/tanren-api
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=sha-${{ needs.version.outputs.sha_short }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/tanren-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pr-build:
    name: PR Build Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/tanren-api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
