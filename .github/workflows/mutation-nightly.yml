name: Mutation Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  mutation:
    name: behavior mutation shard ${{ matrix.package-shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-shard: ["0/4", "1/4", "2/4", "3/4"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1
        with:
          tool: just,cargo-mutants

      - name: Run behavior mutation
        env:
          TANREN_MUTATION_PACKAGE_SHARD: ${{ matrix.package-shard }}
        run: just mutation

      - name: Upload mutation artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mutation-enforced-${{ strategy.job-index }}
          path: artifacts/mutation/enforced/latest
          if-no-files-found: warn

      - name: Open mutation failure issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const title = `Nightly mutation failure (${context.repo.owner}/${context.repo.repo})`;
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "Nightly behavior mutation failed.",
              "",
              `Run: ${runUrl}`,
              `Package shard: ${{ matrix.package-shard }}`,
              "",
              "Review the uploaded mutation artifact and triage missed, timed out, or unviable mutants before closing this issue."
            ].join("\n");
            if (existing.data.total_count > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data.items[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
