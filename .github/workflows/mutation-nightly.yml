name: Mutation Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  actions: read
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  preflight:
    name: mutation preflight
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      skip_reason: ${{ steps.decide.outputs.skip_reason }}
      previous_run_url: ${{ steps.decide.outputs.previous_run_url }}
    steps:
      - name: Decide whether mutation should run
        id: decide
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const workflowId = "mutation-nightly.yml";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (context.eventName === "workflow_dispatch") {
              core.setOutput("should_run", "true");
              core.setOutput("skip_reason", "");
              core.setOutput("previous_run_url", "");
              await core.summary
                .addHeading("Mutation preflight")
                .addRaw("Manual dispatch always runs mutation.")
                .addRaw(`\n\nRun: ${runUrl}`)
                .write();
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch: "main",
              event: "schedule",
              per_page: 20,
            });
            const previous = runs.find((run) => run.id !== context.runId);
            const previousRunUrl = previous ? previous.html_url : "";
            const sameSha = previous && previous.head_sha === context.sha;
            const shouldRun = !sameSha;
            const skipReason = sameSha
              ? `Skipping mutation because previous scheduled run used the same SHA ${context.sha}.`
              : "";

            core.setOutput("should_run", shouldRun ? "true" : "false");
            core.setOutput("skip_reason", skipReason);
            core.setOutput("previous_run_url", previousRunUrl);

            await core.summary
              .addHeading("Mutation preflight")
              .addRaw(`Decision: ${shouldRun ? "run mutation" : "skip mutation"}`)
              .addRaw(`\n\nCurrent SHA: ${context.sha}`)
              .addRaw(previous ? `\n\nPrevious scheduled SHA: ${previous.head_sha}` : "\n\nNo previous scheduled run found.")
              .addRaw(previousRunUrl ? `\n\nPrevious run: ${previousRunUrl}` : "")
              .addRaw(skipReason ? `\n\n${skipReason}` : "")
              .write();

  mutation:
    name: behavior mutation ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-services 0/3
            artifact: app-services-0-of-3
            packages: tanren-app-services
            mutant_shard: 0/3
          - name: app-services 1/3
            artifact: app-services-1-of-3
            packages: tanren-app-services
            mutant_shard: 1/3
          - name: app-services 2/3
            artifact: app-services-2-of-3
            packages: tanren-app-services
            mutant_shard: 2/3
          - name: store 0/2
            artifact: store-0-of-2
            packages: tanren-store
            mutant_shard: 0/2
          - name: store 1/2
            artifact: store-1-of-2
            packages: tanren-store
            mutant_shard: 1/2
          - name: runtime
            artifact: runtime
            packages: tanren-runtime
            mutant_shard: 0/1
          - name: domain-cli-mcp
            artifact: domain-cli-mcp
            packages: tanren-domain,tanren-cli,tanren-mcp
            mutant_shard: 0/1
          - name: remaining
            artifact: remaining
            packages: tanren-api,tanren-contract,tanren-harness-claude,tanren-harness-codex,tanren-harness-opencode,tanren-observability,tanren-orchestrator,tanren-planner,tanren-policy,tanren-runtime-docker,tanren-runtime-local,tanren-runtime-remote,tanren-scheduler,tanren-tui,tanrend
            mutant_shard: 0/1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1
        with:
          tool: just,cargo-mutants

      - name: Run behavior mutation
        env:
          TANREN_MUTATION_PACKAGES: ${{ matrix.packages }}
          TANREN_MUTATION_SHARD: ${{ matrix.mutant_shard }}
        run: just mutation

      - name: Append mutation summary
        if: always()
        run: |
          if [[ -f artifacts/mutation/enforced/latest/triage.md ]]; then
            cat artifacts/mutation/enforced/latest/triage.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Mutation triage summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload mutation artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mutation-enforced-${{ matrix.artifact }}
          path: artifacts/mutation/enforced/latest
          if-no-files-found: warn

      - name: Open mutation failure issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require("fs");
            const title = `Nightly mutation failure (${context.repo.owner}/${context.repo.repo})`;
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let counts = {};
            let packages = `${{ matrix.packages }}`;
            try {
              const triage = JSON.parse(fs.readFileSync("artifacts/mutation/enforced/latest/triage.json", "utf8"));
              counts = triage.outcomes || {};
              packages = (triage.run && Array.isArray(triage.run.packages))
                ? triage.run.packages.join(", ")
                : packages;
            } catch (error) {
              core.warning(`Could not read mutation triage.json: ${error.message}`);
            }
            const body = [
              "Nightly behavior mutation failed.",
              "",
              `Run: ${runUrl}`,
              `Shard: ${{ matrix.name }}`,
              `Packages: ${packages}`,
              `Cargo-mutants shard: ${{ matrix.mutant_shard }}`,
              "",
              `Tested: ${counts.tested_count ?? "unknown"}`,
              `Caught: ${counts.caught_count ?? "unknown"}`,
              `Missed: ${counts.missed_count ?? "unknown"}`,
              `Timeouts: ${counts.timeout_count ?? "unknown"}`,
              `Unviable: ${counts.unviable_count ?? "unknown"}`,
              "",
              `Artifact: mutation-enforced-${{ matrix.artifact }}`,
              "",
              "Review triage.md, survivors.json, missed-by-file.tsv, and timeouts-by-file.tsv in the uploaded mutation artifact before closing this issue."
            ].join("\n");
            if (existing.data.total_count > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data.items[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

  skipped:
    name: mutation skipped
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.should_run != 'true'
    steps:
      - name: Report skipped mutation
        run: |
          {
            echo "# Mutation skipped"
            echo
            echo "${{ needs.preflight.outputs.skip_reason }}"
            echo
            echo "Previous run: ${{ needs.preflight.outputs.previous_run_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
