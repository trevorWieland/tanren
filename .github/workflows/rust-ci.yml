name: Rust CI

on:
  push:
    branches: ["rewrite/**"]
  pull_request:
    branches: ["rewrite/**"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ============================================================
  # Lint & Format
  # ============================================================
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check TOML formatting
        run: taplo fmt --check Cargo.toml bin/*/Cargo.toml crates/*/Cargo.toml .cargo/*.toml .config/*.toml rust-toolchain.toml clippy.toml taplo.toml deny.toml .rustfmt.toml

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features tanren-store/test-hooks -- -D warnings

  # ============================================================
  # Test
  # ============================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --workspace --features tanren-store/test-hooks --profile ci --no-tests=pass

  # ============================================================
  # Integration — Postgres
  # ============================================================
  # Runs tanren-store's Postgres integration suite against a service
  # container. Local `just test` uses testcontainers and hits the same
  # code path via TANREN_TEST_POSTGRES_URL.
  integration-postgres:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: tanren
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run Postgres integration tests
        env:
          TANREN_TEST_POSTGRES_URL: postgres://postgres:tanren@localhost:5432/postgres
        run: cargo nextest run -p tanren-store --features tanren-store/test-hooks,tanren-store/postgres-integration --no-tests=pass

  # ============================================================
  # Coverage (Linux only)
  # ============================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov nextest --workspace --features tanren-store/test-hooks --lcov --output-path lcov.info --no-tests=pass

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false

  # ============================================================
  # Dependency audit
  # ============================================================
  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ============================================================
  # Documentation
  # ============================================================
  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ============================================================
  # Unused dependencies
  # ============================================================
  machete:
    name: Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: Check for unused dependencies
        run: cargo machete

  # ============================================================
  # Quality gates (file length + inline suppression + crate layering)
  # ============================================================
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check file line counts
        run: just check-lines

      - name: Check inline lint suppression
        run: just check-suppression

      - name: Check crate dependency layering
        run: just check-deps

      - name: Check thin transport interfaces
        run: just check-thin-interfaces

      - name: Check store-bypass guardrails
        run: just check-store-bypass

      - name: Check local/workflow CI parity rules
        run: just check-ci-parity
