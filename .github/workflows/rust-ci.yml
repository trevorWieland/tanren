name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  ci:
    name: just ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - uses: taiki-e/install-action@787505cde8a44ea468a00478fe52baf23b15bccd
        with:
          tool: just,taplo-cli,rumdl,lychee,cargo-llvm-cov,cargo-deny,cargo-machete

      - name: Run PR gate
        run: just ci

      - name: Upload behavior inventory artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: behavior-enforced
          path: artifacts/behavior/enforced/latest
          if-no-files-found: warn

      - name: Upload BDD artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bdd-enforced
          path: artifacts/bdd/enforced/latest
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-enforced
          path: artifacts/coverage/enforced/latest
          if-no-files-found: warn
